{% extends 'base.html' %}
{% block title %}Login | Maahir Global{% endblock %}

{% block content %}
<section class="section" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 120px;">
    <div class="container" style="max-width: 500px; width: 100%;">
        <div class="glass reveal" style="padding: 50px; border-radius: var(--radius-lg); text-align: center; position: relative; overflow: hidden;">
            <div style="position: absolute; top: -50px; left: -50px; width: 150px; height: 150px; background: var(--secondary-glow); border-radius: 50%; filter: blur(50px);"></div>
            
            <h2 style="margin-bottom: 30px;">Welcome <span>Back</span></h2>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Enter your credentials to access your global dashboard.</p>
            
            <form action="/account" class="auth-form" style="display: flex; flex-direction: column; gap: 20px; text-align: left;">
                <div class="form-group">
                    <label style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; display: block;">Email Address</label>
                    <input type="email" placeholder="name@example.com" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-white);" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="font-size: 0.8rem; color: var(--text-dim);">Password</label>
                        <a href="#" style="font-size: 0.75rem; color: var(--primary);">Forgot?</a>
                    </div>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-white);" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 20px;">Unlock Dashboard</button>
            </form>
            
            <div style="margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--glass-border);">
                <p style="color: var(--text-muted); font-size: 0.9rem;">Don't have an account? <a href="/register" style="color: var(--primary); font-weight: 700;">Sign Up</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
